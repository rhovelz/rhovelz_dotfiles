#source /usr/share/powerline/bindings/tmux/powerline.conf


#############################
########## Bindings
#############################
# rdvn
# Set the prefix to `ctrl + a` instead of `ctrl + b`
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on

# Use | and - to split a window vertically and horizontally instead of " and % respoectively
bind h split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Open ~/.tmux.conf in vim and reload settings on quit
unbind e
bind e new-window -n '~/.tmux.conf' "sh -c 'nvim ~/.tmux.conf && tmux source ~/.tmux.conf'"

# Bind D to resize the window to be 8 lines smaller
bind D resize-pane -D 8


# Switch betewen panes using alt + arrow
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Use shift + arrow key to move between windows in a session
bind -n S-Left  previous-window
bind -n S-Right next-window

# Use r to quickly reload tmux settings
unbind r
bind r \
	source-file ~/.tmux.conf \;\
	display 'RELOADED'

# Mouse mode
set -g mouse on

# Use a to toggle synchronize panes
bind a set-window-option synchronize-panes

# prefix + / to search
bind-key / copy-mode \; send-key ?

# prefix + h to clear screen and history buffer
bind y \
    send-keys "C-c; clear && tmux clear-history" \;\
    send-keys "Enter" \;\
    display 'Screen cleared'

# Setup 'v' to begin selection, just like Vim
bind-key -T copy-mode-vi 'v' send -X begin-selection

 # Setup 'y' to yank (copy), just like Vim
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle

#############################
########## Settings
#############################

# Refresh status line every 5 seconds - Good for when music is playing / update time etc
set -g status-interval 1

# Start window and pane indices at 1.
set -g base-index 1
#set -g pane-base-index 1

# length of tmux status line
set -g status-left-length 30
set -g status-right-length 150

# Make active pane border red
set -g pane-active-border-style fg=colour1

#Set the left and right status

# Set the history limit so we get lots of scrollback.
setw -g history-limit 500000


########################################################################################################################



set -g @plugin "arcticicestudio/nord-tmux"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'


## Disable auto rename window
set-option -g allow-rename off
bind-key          , command-prompt "rename-window '%%'"
set -g window-status-format '#I:#(pwd="#{pane_current_path}"; echo ${pwd####*/})#F'
set -g window-status-current-format '#I:#(pwd="#{pane_current_path}"; echo ${pwd####*/})#F'
#set-option -g automatic-rename-format '#{b;s/your_username/~/:pane_current_path}'
#set-option -g automatic-rename-format "#{?#{==:#{pane_current_command},bash},#{b:pane_current_path},#{pane_current_command}}"
set-option -g automatic-rename-format "#{b;s/your_username}#{b:pane_current_path}-#{pane_current_command}"

#############################
########## Dracula Theme
#############################

# Available plugins: battery, cpu-usage, git, gpu-usage, ram-usage, network, 
# network-bandwidth, network-ping, weather, time
set -g @dracula-plugins "git gpu-usage network-bandwidth network network-ping cpu-usage ram-usage weather time"

# Use powerline symbols
set -g @dracula-show-powerline true

# Switch to 24h time
set -g @dracula-show-timezone true
set -g @dracula-day-month true
set -g @dracula-military-time true
set -g @dracula-fixed-location "Banda Aceh"
set -g @dracula-show-fahrenheit false
set -g @dracula-show-location true

# Color
set -g @dracula-git-colors "green dark_gray"
set -g @dracula-gpu-usage-colors "pink dark_gray"
set -g @dracula-network-colors "purple dark_gray"
set -g @dracula-network-bandwidth-colors "cyan dark_gray"
set -g @dracula-network-ping-colors "dark_purple dark_gray"
set -g @dracula-cpu-usage-colors "orange dark_gray"
set -g @dracula-ram-usage-colors "red dark_gray"
set -g @dracula-weather-colors "yellow dark_gray"
set -g @dracula-time-colors "green dark_gray"


# Set the colors for the left icon (defaults to a smiley or window name)
set -g @dracula-show-left-icon session

# Load the theme
run-shell ~/.tmux/themes/dracula/dracula.tmux
